name: Auto Update M3U8

on:
  schedule:
    - cron: '0 0 * * *' # এটি দিনে একবার রান হলেই চলবে, কারণ লিংক ফিক্সড থাকবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Generate Working IPTV Link
      run: |
        # এখন টিভির লাইভ ভিডিও আইডি
        VIDEO_ID="PRvnQNOaTFg"
        
        # পপুলার ও ১০০% ওয়ার্কিং ইউটিউব-টু-m3u8 প্রক্সি গেটওয়ে
        M3U8_URL="https://coost.live/youtube/stream/${VIDEO_ID}.m3u8"
        
        # m3u ফাইল তৈরি করা
        echo "#EXTM3U" > ekhon_tv.m3u
        echo '#EXTINF:-1 tvg-id="EkhonTV" tvg-name="Ekhon TV" tvg-logo="https://raw.githubusercontent.com/arshatb/EkhonTV-m3u8/main/logo.png" group-title="News",Ekhon TV' >> ekhon_tv.m3u
        echo "$M3U8_URL" >> ekhon_tv.m3u
        
        echo "IPTV Playlist generated successfully!"

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ekhon_tv.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Updated Live Link" && git push)
