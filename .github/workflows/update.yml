name: Auto Update M3U8

on:
  schedule:
    - cron: '0 */6 * * *' # দিনে ৪ বার রান হবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Generate Unstoppable IPTV Link
      run: |
        # এখন টিভির লাইভ ভিডিও আইডি
        VIDEO_ID="PRvnQNOaTFg"
        
        # বিশ্বজুড়ে ব্যবহৃত সবচেয়ে স্ট্যাবল ও ১00% ওয়ার্কিং ইউটিউব-টু-m3u8 গেটওয়ে লিংক
        M3U8_URL="https://hls.piped.video/live/${VIDEO_ID}"
        
        # m3u ফাইল তৈরি করা
        echo "#EXTM3U" > ekhon_tv.m3u
        echo '#EXTINF:-1 tvg-id="EkhonTV" tvg-name="Ekhon TV" tvg-logo="https://raw.githubusercontent.com/arshatb/EkhonTV-m3u8/main/logo.png" group-title="News",Ekhon TV' >> ekhon_tv.m3u
        echo "$M3U8_URL" >> ekhon_tv.m3u
        
        echo "Link successfully written!"

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ekhon_tv.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Updated Live Link" && git push)
