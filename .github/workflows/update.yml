name: Auto Update M3U8

on:
  schedule:
    # প্রতি ৩ ঘণ্টা পর পর লিংক আপডেট হবে যেন কখনো বন্ধ না হয়
    - cron: '0 */3 * * *'
  workflow_dispatch: # আপনি চাইলে যেকোনো সময় ম্যানুয়ালি রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install yt-dlp
      run: |
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Fetch M3U8 and Create Playlist
      run: |
        # ইউটিউব লাইভ থেকে লিংক বের করা
        M3U8_URL=$(yt-dlp -g "https://www.youtube.com/live/PRvnQNOaTFg")
        
        # m3u ফাইল তৈরি করা
        echo "#EXTM3U" > ekhon_tv.m3u
        echo '#EXTINF:-1 tvg-id="EkhonTV" tvg-name="Ekhon TV" tvg-logo="https://raw.githubusercontent.com/arshatb/EkhonTV-m3u8/main/logo.png" group-title="News",Ekhon TV' >> ekhon_tv.m3u
        echo "$M3U8_URL" >> ekhon_tv.m3u

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ekhon_tv.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Updated Live Link" && git push)
